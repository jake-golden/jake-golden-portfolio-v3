<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Resume of Jake Golden" />
    <meta name="author" content="Jake Golden" />
    <title>Jake Golden - Resume</title>
    <script src="js/head.js"></script>
    <style>
      .download-row a.btn {
        font-weight: 600;
        font-size: clamp(0.9rem, 1.2vw + 0.6rem, 1.1rem);
      }
      .download-row .bi { font-size: 1.2em; }
    </style>
  </head>
  <body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">
      <div id="navbar-placeholder"></div>
      <script src="js/projects-data.js"></script>
      <script src="js/navbar.js"></script>

      <header class="py-5 text-center">
        <div class="container px-5">
          <h1 class="display-4 fw-bolder"><span class="text-gradient d-inline">Resume</span></h1>
        </div>
      </header>

      <section class="py-2">
        <div class="container px-5">
          <div class="content-box mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 download-row mb-3">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-file-earmark-pdf" style="font-size:1.5rem; color:#c62828;"></i>
                <strong>Jake Golden - Resume (PDF)</strong>
              </div>
              <div class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-lg d-flex align-items-center gap-2" href="assets/resume/Jake Golden - Resume.pdf" download>
                  <i class="bi bi-download"></i>
                  Download PDF
                </a>
                <a class="btn btn-primary btn-lg d-flex align-items-center gap-2" href="assets/resume/Jake Golden - Resume.pdf" target="_blank" rel="noopener">
                  <i class="bi bi-box-arrow-up-right"></i>
                  Open in new tab
                </a>
              </div>
            </div>
            <embed class="resume-embed" src="assets/resume/Jake Golden - Resume.pdf#view=FitH" type="application/pdf" />
            <noscript>
              <div class="p-3 text-center">
                <p>Your browser may not support embedded PDFs. You can download the resume below:</p>
                <a class="btn btn-outline-primary" href="assets/resume/Jake Golden - Resume.pdf" download>
                  Download Resume
                </a>
              </div>
            </noscript>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/footer.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
